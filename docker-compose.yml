services:
  # Main application service
  fage-generator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fage-character-generator
    ports:
      - "8000:8000"
    environment:
      # API Configuration
      - API_TITLE=FAGE Character Generator API
      - API_VERSION=2.0.0
      - API_DESCRIPTION=REST API for Fantasy AGE character management

      # Server Configuration
      - HOST=0.0.0.0
      - PORT=8000
      - RELOAD=false

      # CORS Configuration
      # Add production frontend URL here when deploying
      - CORS_ORIGINS=["http://localhost:5173","http://localhost:8000"]
      - CORS_ALLOW_CREDENTIALS=true
      - CORS_ALLOW_METHODS=["*"]
      - CORS_ALLOW_HEADERS=["*"]

      # File Paths
      - DATA_DIR=/app/backend/data
      - STORAGE_DIR=/app/backend/storage
      - PDF_DIR=/app/backend/generated_pdfs

      # Logging
      - LOG_LEVEL=INFO

    volumes:
      # Persist character data
      - character-data:/app/backend/storage/characters

      # Persist generated PDFs (optional, PDFs are temporary)
      - pdf-data:/app/backend/generated_pdfs

      # For development: mount source code (comment out in production)
      # - ./backend:/app/backend
      # - ./frontend/dist:/app/frontend/dist

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    networks:
      - fage-network

  # Optional: Nginx reverse proxy for production
  # Uncomment to serve frontend separately
  # nginx:
  #   image: nginx:alpine
  #   container_name: fage-nginx
  #   ports:
  #     - "80:80"
  #   volumes:
  #     - ./frontend/dist:/usr/share/nginx/html:ro
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #   depends_on:
  #     - fage-generator
  #   restart: unless-stopped
  #   networks:
  #     - fage-network

networks:
  fage-network:
    driver: bridge

volumes:
  character-data:
    driver: local
  pdf-data:
    driver: local
