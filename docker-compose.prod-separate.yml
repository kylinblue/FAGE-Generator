# Production Docker Compose with separate frontend (Nginx) and backend ports
services:
  # Backend API Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: fage-backend-prod
    ports:
      - "8000:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - RELOAD=false
      - LOG_LEVEL=INFO
      - CORS_ORIGINS=["http://localhost:3000","http://localhost:8000"]
    volumes:
      - backend-data:/app/backend/storage/characters
      - pdf-data:/app/backend/generated_pdfs
    networks:
      - fage-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # Frontend Nginx Service
  frontend:
    image: nginx:alpine
    container_name: fage-frontend-prod
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - fage-network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

networks:
  fage-network:
    driver: bridge

volumes:
  backend-data:
    driver: local
  pdf-data:
    driver: local
